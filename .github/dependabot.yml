version: 2
updates:
  - package-ecosystem: npm
    directory: '/'
    schedule:
      interval: monthly
      time: '07:00'
      timezone: 'Europe/Berlin'
    groups:
      minor:
        update-types: ['minor']
      major:
        update-types: ['major']
  - package-ecosystem: npm
    directory: '/'
    schedule:
      interval: weekly
      time: '07:00'
      timezone: 'Europe/Berlin'
    groups:
      patch:
        update-types: ['patch']
  - package-ecosystem: 'docker'
    directory: '/'
    schedule:
      interval: monthly
  - package-ecosystem: docker-compose
    directory: '/'
    schedule:
      interval: monthly
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: monthly
